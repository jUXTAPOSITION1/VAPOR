name: Sync secrets to Fly.io

# Manual only — deliberately not on every push. flyctl secrets set triggers
# a Fly release (and a machine restart) even when the value is unchanged,
# so this only runs when you actually need to rotate or add a secret.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@1.5
      - run: |
          flyctl secrets set \
            SETTLEMENT_SIGNER_PRIVATE_KEY="${{ secrets.SETTLEMENT_SIGNER_PRIVATE_KEY }}" \
            BASE_MAINNET_RPC_URL="${{ secrets.BASE_MAINNET_RPC_URL }}" \
            --app vapor-facilitator
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
