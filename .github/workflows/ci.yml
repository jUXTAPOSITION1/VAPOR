name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run prisma:generate

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
