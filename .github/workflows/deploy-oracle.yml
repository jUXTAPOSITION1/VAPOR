name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TEMPORARY (manual trigger only) — resolves node:22-alpine's real
      # digest for a Node 20->22 base image bump (Node 20 hit its documented
      # end-of-life 2026-04-30). Remove once the Dockerfile is repinned.
      - name: Resolve node:22-alpine digest (manual trigger only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          docker pull node:22-alpine
          docker inspect --format='{{index .RepoDigests 0}}' node:22-alpine

      # The real deploy builds this same Dockerfile a second time, directly
      # on the Oracle instance over SSH — this build exists only to scan the
      # image before that deploy runs, not to be deployed itself.
      - name: Build image for scanning
        run: docker build -t vapor:scan .

      # Runs trivy via its own official Docker image (Docker-in-Docker over
      # the shared socket) rather than installing a binary — sidesteps two
      # dead ends: aquasecurity/trivy-action's v0.30.0 release internally
      # references aquasecurity/setup-trivy@v0.2.2, a tag GitHub can no
      # longer resolve; and trivy's own GitHub Releases no longer attach a
      # standalone Linux binary tarball for this version (confirmed —
      # release page shows only the 2 auto-generated source archives).
      # Pinned to the image's digest, not the mutable "0.69.0" tag, same
      # reasoning as the other pins in this project.
      - name: Scan for OS-package and dependency vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:13a400393ac3714e9ff12f95ae3ac29b28bd8fe3796bc492fa70a8ed2920fb99 \
            image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 vapor:scan

  deploy:
    needs: [test, container-scan]
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repo to the instance
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'dist' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/vapor/"

      - name: Write server-side .env
        run: |
          cat > /tmp/vapor.env <<EOF
          BASE_MAINNET_RPC_URL=${{ secrets.BASE_MAINNET_RPC_URL }}
          SETTLEMENT_SIGNER_PRIVATE_KEY=${{ secrets.SETTLEMENT_SIGNER_PRIVATE_KEY }}
          DEFAULT_MAX_RISK_SCORE=${{ secrets.DEFAULT_MAX_RISK_SCORE }}
          DEFAULT_MAX_AMOUNT_USD=${{ secrets.DEFAULT_MAX_AMOUNT_USD }}
          REPUTATION_PROVIDER_BASE_URL=${{ secrets.REPUTATION_PROVIDER_BASE_URL }}
          REPUTATION_PROVIDER_API_KEY=${{ secrets.REPUTATION_PROVIDER_API_KEY }}
          WEBHOOK_SIGNING_SECRET=${{ secrets.WEBHOOK_SIGNING_SECRET }}
          API_KEYS=${{ secrets.API_KEYS }}
          EOF
          scp -i ~/.ssh/deploy_key /tmp/vapor.env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/vapor/.env"
          rm -f /tmp/vapor.env

      - name: Build and restart the container
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -euo pipefail
            cd /opt/vapor
            chmod 600 .env
            docker compose up -d --build --remove-orphans
            docker image prune -f
          '
