name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The real deploy builds this same Dockerfile a second time, directly
      # on the Oracle instance over SSH — this build exists only to scan the
      # image before that deploy runs, not to be deployed itself.
      - name: Build image for scanning
        run: docker build -t vapor:scan .

      # Pinned to a commit SHA, not the mutable "v0.30.0" tag — same
      # convention already used for cloudflare/wrangler-action elsewhere in
      # this project, for the same reason the Docker base image above is
      # pinned by digest rather than a tag.
      - name: Scan for OS-package and dependency vulnerabilities
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: vapor:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  deploy:
    needs: [test, container-scan]
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repo to the instance
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'dist' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/vapor/"

      - name: Write server-side .env
        run: |
          cat > /tmp/vapor.env <<EOF
          BASE_MAINNET_RPC_URL=${{ secrets.BASE_MAINNET_RPC_URL }}
          SETTLEMENT_SIGNER_PRIVATE_KEY=${{ secrets.SETTLEMENT_SIGNER_PRIVATE_KEY }}
          DEFAULT_MAX_RISK_SCORE=${{ secrets.DEFAULT_MAX_RISK_SCORE }}
          DEFAULT_MAX_AMOUNT_USD=${{ secrets.DEFAULT_MAX_AMOUNT_USD }}
          REPUTATION_PROVIDER_BASE_URL=${{ secrets.REPUTATION_PROVIDER_BASE_URL }}
          REPUTATION_PROVIDER_API_KEY=${{ secrets.REPUTATION_PROVIDER_API_KEY }}
          WEBHOOK_SIGNING_SECRET=${{ secrets.WEBHOOK_SIGNING_SECRET }}
          API_KEYS=${{ secrets.API_KEYS }}
          EOF
          scp -i ~/.ssh/deploy_key /tmp/vapor.env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/vapor/.env"
          rm -f /tmp/vapor.env

      - name: Build and restart the container
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -euo pipefail
            cd /opt/vapor
            chmod 600 .env
            docker compose up -d --build --remove-orphans
            docker image prune -f
          '
