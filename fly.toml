# Fly.io app configuration for VAPOR. `app` is set at deploy time via
# `flyctl deploy --app <name>` in CI, so this stays the placeholder here —
# see docs/DEPLOYMENT.md for the one-time setup this file depends on.
app = "vapor-facilitator"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3402"
  DATABASE_URL = "file:/data/vapor.db"

[[mounts]]
  source = "vapor_data"
  destination = "/data"

[http_service]
  internal_port = 3402
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
