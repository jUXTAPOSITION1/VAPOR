services:
  vapor:
    build: .
    # Bound to localhost only — Caddy is the public entrypoint (443, with
    # automatic TLS) and reaches this over the internal Docker network.
    # Still reachable directly on the instance itself for debugging via
    # curl http://localhost:3402/healthz.
    ports:
      - "127.0.0.1:3402:3402"
    environment:
      NODE_ENV: production
      PORT: 3402
      # Swap for a postgresql:// URL and switch prisma/schema.prisma's
      # datasource provider to "postgresql" for a multi-instance deployment.
      DATABASE_URL: file:/data/vapor.db
      BASE_MAINNET_RPC_URL: ${BASE_MAINNET_RPC_URL}
      SETTLEMENT_SIGNER_PRIVATE_KEY: ${SETTLEMENT_SIGNER_PRIVATE_KEY}
      DEFAULT_MAX_RISK_SCORE: ${DEFAULT_MAX_RISK_SCORE:-70}
      DEFAULT_MAX_AMOUNT_USD: ${DEFAULT_MAX_AMOUNT_USD:-1000}
      REPUTATION_PROVIDER_BASE_URL: ${REPUTATION_PROVIDER_BASE_URL}
      REPUTATION_PROVIDER_API_KEY: ${REPUTATION_PROVIDER_API_KEY}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      API_KEYS: ${API_KEYS}
    volumes:
      - vapor-data:/data

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - vapor

volumes:
  vapor-data:
  caddy-data:
  caddy-config:
